{{- $hasSingleInstanceEntrypoint := ne (trim (default "" .Values.vl.entrypoint)) "" -}}
{{- $hasSingleInstanceConfig := $hasSingleInstanceEntrypoint -}}
{{- if .Values.vl.bearerToken -}}
{{- $hasSingleInstanceConfig = true -}}
{{- end -}}
{{- if gt (len (default (list) .Values.vl.headers)) 0 -}}
{{- $hasSingleInstanceConfig = true -}}
{{- end -}}
{{- $hasMultiConfig := false -}}
{{- range .Values.env -}}
{{- $envName := default "" .name -}}
{{- if eq $envName "VL_INSTANCE_ENTRYPOINT" -}}
{{- $hasSingleInstanceEntrypoint = true -}}
{{- $hasSingleInstanceConfig = true -}}
{{- end -}}
{{- if or (eq $envName "VL_INSTANCE_BEARER_TOKEN") (eq $envName "VL_INSTANCE_HEADERS") (eq $envName "VL_DEFAULT_TENANT_ID") -}}
{{- $hasSingleInstanceConfig = true -}}
{{- end -}}
{{- if eq $envName "VL_ENVIRONMENTS" -}}
{{- $hasMultiConfig = true -}}
{{- end -}}
{{- end -}}
{{- if and $hasSingleInstanceConfig $hasMultiConfig -}}
{{- fail "configure exactly one VictoriaLogs mode: either single-instance settings (vl.* or VL_INSTANCE_*) or multi-environment settings (VL_ENVIRONMENTS with VL_INSTANCE_<ENV>_*), not both" -}}
{{- end -}}
{{- if not (or $hasSingleInstanceEntrypoint $hasMultiConfig) -}}
{{- fail "configure VictoriaLogs by setting either vl.entrypoint (or VL_INSTANCE_ENTRYPOINT) for single-instance mode, or VL_ENVIRONMENTS for multi-environment mode" -}}
{{- end -}}
{{- if and $hasSingleInstanceConfig (not $hasSingleInstanceEntrypoint) -}}
{{- fail "single-instance settings require vl.entrypoint (or VL_INSTANCE_ENTRYPOINT)" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-victorialogs.fullname" . }}
  labels: {{ include "mcp-victorialogs.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{ include "mcp-victorialogs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations: {{ toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "mcp-victorialogs.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{ toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mcp-victorialogs.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext: {{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- $repo := .Values.image.repository }}
          {{- with .Values.image.registry }}
            {{- $repo = printf "%s/%s" . $repo }}
          {{- end }}
          image: "{{ $repo }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: MCP_LISTEN_ADDR
              value: "0.0.0.0:{{  .Values.service.port }}"
            - name: MCP_SERVER_MODE
              value: "{{ .Values.mcp.mode }}"
            {{- with .Values.vl.entrypoint }}
            - name: VL_INSTANCE_ENTRYPOINT
              value: "{{ . }}"
            {{- end }}
            {{- with .Values.vl.bearerToken }}
            - name: VL_INSTANCE_BEARER_TOKEN
              {{- if kindIs "map" . }}
              valueFrom: {{ toYaml . | nindent 16 }}
              {{- else }}
              value: "{{ . }}"
              {{- end }}
            {{- end }}
            {{- with .Values.vl.headers }}
            - name: VL_INSTANCE_HEADERS
              value: "{{ join "," . }}"
            {{- end }}
            {{- with .Values.mcp.disable.resources }}
            - name: MCP_DISABLE_RESOURCES
              value: "{{ . }}"
            {{- end }}
            {{- with .Values.mcp.disable.tools }}
            - name: MCP_DISABLED_TOOLS
              value: "{{ join "," . }}"
            {{- end }}
            {{- with .Values.mcp.heartbeatInterval }}
            - name: MCP_HEARTBEAT_INTERVAL
              value: "{{ . }}"
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts: {{ toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{ toYaml . | nindent 8 }}
      {{- end }}
